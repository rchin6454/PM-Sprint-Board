<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2F7;
  --surface:rgba(255,255,255,0.85);
  --card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --border-mid:rgba(0,0,0,0.12);
  --text:#1C1C1E;
  --text2:#3C3C43;
  --text3:#8E8E93;
  --accent:#007AFF;
  --accent-dim:#0055CC;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  --mono:'SF Mono','DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR — Apple frosted glass ── */
.topbar{
  height:auto;
  padding:16px 24px 14px;
  display:flex;flex-direction:column;gap:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
.topbar-row1{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.brand{
  font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);
}
.tb-right{display:flex;align-items:center;gap:8px}
.sprint-sel{
  height:26px;padding:0 10px;
  border:0.5px solid var(--border-mid);border-radius:13px;
  background:rgba(120,120,128,0.08);color:var(--text2);
  font-family:var(--font);font-size:11px;font-weight:500;
  appearance:none;cursor:pointer;
}
.sprint-sel option{background:#FFF;color:#1C1C1E}
.up-btn{
  display:inline-flex;align-items:center;gap:4px;
  height:26px;padding:0 12px;
  border:0.5px solid var(--border-mid);border-radius:13px;
  background:rgba(120,120,128,0.08);
  font-size:11px;font-weight:500;
  color:var(--text3);cursor:pointer;
  font-family:var(--font);transition:background .12s;
}
.up-btn:hover{background:rgba(120,120,128,0.14);color:var(--text2)}
.up-btn.done{background:rgba(52,199,89,0.12);color:#34C759;border-color:rgba(52,199,89,0.3)}
.up-btn input{display:none}

/* ── DATE ROW — large Apple-style ── */
.topbar-row2{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.date-nav-btn{
  width:34px;height:34px;
  border-radius:50%;
  background:rgba(120,120,128,0.1);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:16px;
  transition:background .12s,transform .1s;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.date-nav-btn:hover{background:rgba(120,120,128,0.18);transform:scale(1.05)}
.date-nav-btn:active{transform:scale(.93)}

.date-center{
  flex:1;display:flex;align-items:baseline;gap:10px;
  justify-content:center;cursor:default;
}
.date-dow{
  font-size:13px;font-weight:500;
  letter-spacing:-.01em;
  color:var(--text3);
}
.date-main{
  font-size:34px;font-weight:700;
  letter-spacing:-0.04em;
  color:var(--text);line-height:1;
  transition:opacity .1s;
}
.date-main.changing{opacity:0;transform:translateX(8px)}
.date-year{
  font-size:13px;font-weight:400;
  color:var(--text3);
  letter-spacing:-.01em;
}
.date-today-pill{
  font-size:10px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  background:var(--accent);color:white;
  padding:3px 9px;border-radius:100px;
  align-self:center;
  animation:pill-in .2s ease;
}
@keyframes pill-in{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}

/* TODAY button */
.today-pill{
  height:26px;padding:0 12px;
  border-radius:13px;
  background:rgba(0,122,255,0.1);
  border:none;cursor:pointer;
  font-size:11px;font-weight:600;
  color:var(--accent);font-family:var(--font);
  transition:background .12s;
  flex-shrink:0;
}
.today-pill:hover{background:rgba(0,122,255,0.18)}

/* XP line */
.xp-wrap{height:1px;background:var(--border);flex-shrink:0;overflow:hidden}
.xp-fill{
  height:100%;
  background:linear-gradient(90deg,#007AFF,#5AC8FA,#34C759,#007AFF);
  background-size:300% 100%;
  animation:xp-shift 4s linear infinite;
  transition:width .5s cubic-bezier(.4,0,.2,1);width:0%
}
@keyframes xp-shift{0%{background-position:0% 0}100%{background-position:300% 0}}

/* ── BOARD ── */
.board{flex:1;display:flex;overflow:hidden}

/* ── COLUMN ── */
.col{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  border-right:0.5px solid var(--border);
  overflow:hidden;
  background:var(--bg);
}
.col:last-child{border-right:none}
.col.drag-over{background:rgba(0,122,255,0.04)}
.col-head{
  flex-shrink:0;
  padding:16px 14px 12px;
  border-bottom:0.5px solid var(--border);
  background:rgba(255,255,255,0.7);
}
.col-icon-wrap{margin-bottom:9px;opacity:.6;transition:opacity .2s}
.col:hover .col-icon-wrap{opacity:1}
.col-icon-wrap svg{width:24px;height:24px}
.col-title{font-size:11px;font-weight:600;letter-spacing:-.01em;color:var(--text2)}

/* icon animations — subtle */
@keyframes bulb-p{0%,100%{opacity:.75}50%{opacity:.35}}
@keyframes peer-l{0%,100%{transform:translateX(0)}50%{transform:translateX(2px)}}
@keyframes peer-r{0%,100%{transform:translateX(0)}50%{transform:translateX(-2px)}}
@keyframes brush-s{0%{transform:rotate(0)}100%{transform:rotate(14deg)}}
@keyframes gear-r{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes list-b{0%,100%{transform:translateY(0)}45%{transform:translateY(-2.5px)}}
@keyframes flask-b{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.08)}}
@keyframes rocket-l{0%,100%{transform:translateY(0)}45%{transform:translateY(-3px)}}
@keyframes ray-s{0%{opacity:0;transform:scale(0)}50%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(0)}}

.col:hover .ib{animation:bulb-p .8s ease-in-out infinite}
.col:hover .ir{animation:ray-s .7s ease-in-out infinite}
.col:hover .ipl{animation:peer-l .6s ease-in-out infinite}
.col:hover .ipr{animation:peer-r .6s ease-in-out infinite}
.col:hover .ibr{animation:brush-s .4s ease forwards}
.col:hover .ig{animation:gear-r 1s linear infinite;transform-origin:50% 50%}
.col:hover .il{animation:list-b .45s ease}
.col:hover .ifl{animation:flask-b .6s ease-in-out infinite}
.col:hover .iro{animation:rocket-l .7s ease-in-out infinite}

/* ── GAMIFICATION ── */
.game-bar{
  display:flex;align-items:center;gap:8px;margin-top:6px;
}
.level-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:linear-gradient(135deg,#007AFF,#5856D6);
  color:white;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:100px;
  letter-spacing:.02em;
}
.streak-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:linear-gradient(135deg,#FF9500,#FF3B30);
  color:white;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:100px;
}
.xp-label{font-size:10px;font-weight:500;color:var(--text3)}

/* ── ACTIVE COLUMN — desktop ── */
.col.has-stories .col-head{
  background:var(--col-tint,rgba(0,122,255,0.05));
  border-bottom:2px solid var(--col-color,#007AFF);
}
.col.has-stories .col-title{color:var(--col-color,#007AFF)}
.col.has-stories .col-icon-wrap{opacity:1}

/* ── STORY CARD colour ── */
.story-card{position:relative;overflow:hidden}
.story-card .card-color-bar{
  position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:12px 12px 0 0;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(200%)}
}
.story-card.advancing::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shimmer .4s ease;
  pointer-events:none;
}

/* ── MOBILE ACTIVE ACCORDION ── */
@media(max-width:680px){
  .col.has-stories{
    border:2px solid var(--col-color,#007AFF);
    border-radius:14px;
    margin-bottom:2px;
    overflow:hidden;
  }
  .col.has-stories .col-head{
    background:var(--col-tint,rgba(0,122,255,0.06));
  }
  .col.has-stories .col-title{color:var(--col-color,#007AFF)}
  .col.has-stories .col-icon-wrap{opacity:1}
}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:10px}

/* ── STORY CARD ── */
.story-card{
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:12px;
  padding:12px 12px 10px;
  transition:box-shadow .18s,transform .14s;
  user-select:none;cursor:default;
}
.story-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.story-card.dragging{opacity:.3;transform:rotate(1deg) scale(.97)}
@keyframes card-in{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
.card-in{animation:card-in .18s ease}

.sc-sprint{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:5px;letter-spacing:-.01em}
.sc-title{font-size:13px;font-weight:400;color:var(--text);line-height:1.45;margin-bottom:10px;letter-spacing:-.01em}
.sc-btns{display:flex;gap:6px}
.sc-b{
  flex:1;height:28px;
  border:none;border-radius:8px;
  background:rgba(120,120,128,0.1);
  cursor:pointer;font-size:14px;font-weight:500;
  color:var(--text2);font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.sc-b:hover:not(:disabled){background:rgba(120,120,128,0.18)}
.sc-b:active:not(:disabled){transform:scale(.93)}
.sc-b:disabled{opacity:.2;cursor:default}
.sc-b.done-btn{font-size:11px;font-weight:600;background:rgba(52,199,89,0.12);color:#34C759}
.sc-b.done-btn:hover:not(:disabled){background:rgba(52,199,89,0.2)}

/* WEEKEND */
.weekend-msg{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.wm-txt{font-size:13px;font-weight:500;letter-spacing:-.01em;color:var(--text3)}
/* CELEBRATION */
.celeb{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;animation:ci .2s ease;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@keyframes ci{0%{opacity:0}100%{opacity:1}}
.celeb-card{background:rgba(255,255,255,0.97);border-radius:20px;padding:2.5rem 1.75rem;text-align:center;max-width:320px;width:90%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:cr .3s cubic-bezier(.4,0,.2,1)}
@keyframes cr{0%{transform:translateY(20px) scale(.95);opacity:0}100%{transform:none;opacity:1}}
.celeb-ico{font-size:48px;line-height:1;margin-bottom:14px;display:block;animation:wiggle .8s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.celeb-h{font-size:18px;font-weight:700;letter-spacing:-0.03em;color:var(--text);margin-bottom:6px}
.celeb-p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.celeb-tasks{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.celeb-tasks-lbl{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.celeb-task{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;padding:3px 0}
.celeb-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.celeb-btn{width:100%;height:44px;border:none;border-radius:12px;background:var(--accent);color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);letter-spacing:-.01em;transition:opacity .12s,transform .1s}
.celeb-btn:hover{opacity:.88}.celeb-btn:active{transform:scale(.97)}
.celeb-x{position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:50%;background:rgba(120,120,128,0.15);border:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);cursor:pointer}
.celeb-x:hover{background:rgba(120,120,128,0.25)}
/* CONFETTI */
.cp{position:fixed;pointer-events:none;z-index:9999;border-radius:2px}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,32,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:white;font-size:12px;font-weight:500;letter-spacing:-.01em;padding:8px 18px;border-radius:100px;opacity:0;transition:all .2s;pointer-events:none;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.overlay.hidden{display:none}
.ov-card{background:rgba(255,255,255,0.97);border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.ov-card h2{font-size:18px;font-weight:700;letter-spacing:-0.03em;color:var(--text);margin-bottom:8px}
.ov-card p{font-size:13px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
.dz{border:1.5px dashed rgba(0,0,0,.15);border-radius:14px;padding:1.75rem 1.5rem;cursor:pointer;transition:all .15s}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(0,122,255,.04)}
.dz input{display:none}
.dz-ico{font-size:24px;margin-bottom:8px;opacity:.7}
.dz-lbl{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:3px}
.dz-sub{font-size:11px;color:var(--text3)}
.skip{margin-top:12px;background:transparent;border:none;font-size:13px;font-weight:500;color:var(--accent);cursor:pointer;font-family:var(--font)}
/* ── MOBILE ── */
@media(max-width:680px){
  html,body{overflow:auto;height:auto}
  .app{height:auto;min-height:100vh}
  .topbar-row1{flex-wrap:wrap;gap:8px}
  .board{flex-direction:column;overflow-y:auto;overflow-x:hidden}
  .col{flex:0 0 auto;border-right:none;border-bottom:0.5px solid var(--border)}
  .col:last-child{border-bottom:none}
  .col-head{padding:12px 14px 10px;cursor:pointer;display:flex;align-items:center;gap:10px}
  .col-icon-wrap{margin-bottom:0;flex-shrink:0}
  .col-head-inner{flex:1}
  .col-chev{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
  .col-chev.open{transform:rotate(180deg)}
  .col-body{display:none;padding:10px 12px 12px}
  .col-body.open{display:flex}
  .sc-b{height:36px}
  .date-main{font-size:28px}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="ov-card">
    <h2>PM Board</h2>
    <p>Upload an Excel with two sheets:<br>Sprint Dates and Sprint Stories</p>
    <div class="dz" id="dz">
      <input type="file" id="ovFile" accept=".xlsx,.xls">
      <div class="dz-ico">&#128202;</div>
      <div class="dz-lbl">Drop your Excel here</div>
      <div class="dz-sub">Sprint Dates + Sprint Stories sheets</div>
    </div>
    <button class="skip" id="skipBtn">Use demo data</button>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <div class="topbar-row1">
      <div>
        <div class="brand">PM Board</div>
        <div class="game-bar">
          <span class="level-badge" id="levelBadge">Lv 1</span>
          <span class="streak-badge" id="streakBadge">🔥 0</span>
          <span class="xp-label" id="xpLabel">0 XP</span>
        </div>
      </div>
      <div class="tb-right">
        <select class="sprint-sel" id="sprintSel"></select>
        <div class="up-btn" id="reupBtn"><input type="file" id="reupFile" accept=".xlsx,.xls">&#8593; Upload</div>
      </div>
    </div>
    <div class="topbar-row2">
      <button class="date-nav-btn" id="btnPrev">&#8249;</button>
      <div class="date-center">
        <span class="date-dow" id="dateDow"></span>
        <span class="date-main" id="dateMain"></span>
        <span class="date-year" id="dateYear"></span>
        <span id="todayBadge" class="date-today-pill" style="display:none">Today</span>
      </div>
      <button class="date-nav-btn" id="btnNext">&#8250;</button>
      <button class="today-pill" id="btnToday">Today</button>
    </div>
  </div>

  <div class="xp-wrap"><div class="xp-fill" id="xpFill"></div></div>
  <div id="area" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
</div>

<script>
(function(){
var MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var CC=['#007AFF','#34C759','#FF3B30','#FF9500','#AF52DE','#5AC8FA','#FF2D55','#FFCC00'];

/* Phase icons — thin strokes on white */
var IC='#3C3C43';
var ICONS={
  ideate:'<svg viewBox="0 0 28 28" fill="none"><path class="ib" d="M14 3a8 8 0 0 1 8 8c0 2.9-1.5 5.4-3.8 6.9l-.7.5V21H10.5v-2.6l-.7-.5A8 8 0 0 1 14 3z" stroke="'+IC+'" stroke-width="1.3"/><path d="M10.5 24h7M11.5 21v1.5M16.5 21v1.5" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/><g class="ir"><line x1="14" y1=".5" x2="14" y2="2" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="2.8" x2="7.8" y2="4" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/><line x1="21" y1="2.8" x2="20.2" y2="4" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/></g></svg>',
  peer:'<svg viewBox="0 0 28 28" fill="none"><g class="ipl"><circle cx="9" cy="9" r="3.5" stroke="'+IC+'" stroke-width="1.3"/><path d="M3 24c0-3.5 2.7-5.5 6-5.5" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/></g><g class="ipr"><circle cx="19" cy="9" r="3.5" stroke="'+IC+'" stroke-width="1.3"/><path d="M25 24c0-3.5-2.7-5.5-6-5.5" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/></g><path d="M11 24c0-2.8 1.3-4.5 3-4.5s3 1.7 3 4.5" stroke="'+IC+'" stroke-width="1.3" stroke-linecap="round"/></svg>',

function updateGameBar(){
  var level=Math.floor(xpv/50)+1;
  var el=document.getElementById('levelBadge');if(el)el.textContent='Lv '+level;
  var sl=document.getElementById('streakBadge');if(sl)sl.textContent=(streak>0?'🔥':'')+(streak||0);

  var xpEl=document.getElementById('xpFill');if(xpEl)xpEl.style.width=(xpv%50)*2+'%';

function addXP(n){
  var today=new Date().toDateString();
  if(lastDate!==today){streak++;lastDate=today;localStorage.setItem('pm_streak',streak);localStorage.setItem('pm_last_date',today);}
  xpv+=n;localStorage.setItem('pm_arc_xp',xpv);
  updateGameBar();
  // level up flash
  var newLevel=Math.floor(xpv/50)+1;
  var oldLevel=Math.floor((xpv-n)/50)+1;
  if(newLevel>oldLevel){
    var lb=document.getElementById('levelBadge');
    if(lb){lb.style.transform='scale(1.3)';lb.style.transition='transform .2s';setTimeout(function(){lb.style.transform='scale(1)'},300);}
    toast('Level '+newLevel+' unlocked!');
  }
}

function confetti(ox,oy){
  for(var i=0;i<30;i++){
    (function(){
      var p=document.createElement('div');p.className='cp';
      var w=4+Math.random()*6;var h=w*(Math.random()>.5?.3:1);
      p.style.width=w+'px';p.style.height=h+'px';
      p.style.background=CC[Math.floor(Math.random()*CC.length)];
      p.style.borderRadius=Math.random()>.5?'50%':'1px';
      p.style.left=ox+'px';p.style.top=oy+'px';
      document.body.appendChild(p);
      var a=Math.random()*Math.PI*2;var spd=2+Math.random()*8;
      var vx=Math.cos(a)*spd,vy=Math.sin(a)*spd-4;
      var rot=Math.random()*360,rs=(Math.random()-.5)*14;
      var x=ox,y=oy,op=1,f=0;
      (function tick(){
        f++;vy+=.35;x+=vx;y+=vy;rot+=rs;op=Math.max(0,1-f/50);
        p.style.transform='translate('+x+'px,'+y+'px) rotate('+rot+'deg)';
        p.style.left='0';p.style.top='0';p.style.opacity=op;
        if(op>0&&f<60){requestAnimationFrame(tick)}else{p.remove()}
      })();
    })();
  }
}

function rainConfetti(){
  for(var i=0;i<50;i++){
    (function(){
      var p=document.createElement('div');p.className='cp';
      var w=3+Math.random()*6;var h=w*(Math.random()>.5?.3:1);
      p.style.width=w+'px';p.style.height=h+'px';
      p.style.background=CC[Math.floor(Math.random()*CC.length)];
      p.style.borderRadius=Math.random()>.5?'50%':'1px';
      var sx=Math.random()*window.innerWidth;
      p.style.left=sx+'px';p.style.top='-8px';
      document.body.appendChild(p);
      var vx=(Math.random()-.5)*2,vy=2+Math.random()*4;
      var rot=Math.random()*360,rs=(Math.random()-.5)*8;
      var x=sx,y=-8,op=1,f=0;
      setTimeout(function(){
        (function tick(){
          f++;vy+=.08;x+=vx;y+=vy;rot+=rs;op=Math.max(0,1-f/80);
          p.style.transform='translate('+x+'px,'+y+'px) rotate('+rot+'deg)';
          p.style.left='0';p.style.top='0';p.style.opacity=op;
          if(op>0&&y<window.innerHeight+20){requestAnimationFrame(tick)}else{p.remove()}
        })();
      },Math.random()*600);
    })();
  }
}

function addWD(d,n,back){
  var s=back?-1:1;var c=new Date(d);c.setHours(0,0,0,0);var k=0;
  while(k<n){c.setDate(c.getDate()+s);if(c.getDay()!==0&&c.getDay()!==6)k++;}return c;
}
function inWin(d,w){var ds=new Date(d);ds.setHours(0,0,0,0);return ds>=w.s&&ds<=w.e}
function sameDay(a,b){return a.toDateString()===b.toDateString()}

function computeWins(ss,se){
  ss=new Date(ss);ss.setHours(0,0,0,0);se=new Date(se);se.setHours(0,0,0,0);
  var w={};var cur=addWD(ss,1,true);
  w.groom={s:addWD(cur,1,true),e:new Date(cur)};cur=addWD(w.groom.s,1,true);
  w.eng={s:addWD(cur,3,true),e:new Date(cur)};cur=addWD(w.eng.s,1,true);
  w.design={s:addWD(cur,3,true),e:new Date(cur)};cur=addWD(w.design.s,1,true);
  w.peer={s:addWD(cur,2,true),e:new Date(cur)};cur=addWD(w.peer.s,1,true);
  w.ideate={s:addWD(cur,2,true),e:new Date(cur)};
  w.dev={s:new Date(ss),e:new Date(se)};
  var ts=addWD(se,1);w.test={s:new Date(ts),e:addWD(ts,1)};
  var rs=addWD(w.test.e,1);w.release={s:new Date(rs),e:new Date(rs)};
  Object.keys(w).forEach(function(k){w[k].s.setHours(0,0,0,0);w[k].e.setHours(0,0,0,0)});
  return w;
}

var sprints=[],stories=[],sw=[];
var selDay=new Date();selDay.setHours(0,0,0,0);
var dragSW=null;

function rebuild(){
  sw=[];
  sprints.forEach(function(sp){
    var wins=computeWins(sp.s,sp.e);
    stories.filter(function(s){return s.sprint===sp.name}).forEach(function(st){
      var k=sk(st.title,sp.name);
      if(!pos[k]){
        var today=new Date();today.setHours(0,0,0,0);var def='ideate';
        PHASES.forEach(function(ph){var ww=wins[ph.key];if(ww){if(today>=ww.s&&today<=ww.e)def=ph.key;else if(today>ww.e)def=ph.key;}});
        pos[k]=def;
      }
      sw.push({title:st.title,sprint:sp.name,wins:wins});
    });
  });
  savePOS();
}

function initBoard(){
  var sel=document.getElementById('sprintSel');
  sel.innerHTML='<option value="all">All sprints</option>';
  sprints.forEach(function(sp){var o=document.createElement('option');o.value=sp.name;o.textContent=sp.name;sel.appendChild(o);});
  renderBoard();
}

function phaseForDay(story,d){
  for(var i=0;i<PHASES.length;i++){var w=story.wins[PHASES[i].key];if(w&&inWin(d,w))return PHASES[i].key;}
  return null;
}

function updateDate(){
  var d=new Date(selDay);var today=new Date();today.setHours(0,0,0,0);
  var isToday=sameDay(d,today);
  document.getElementById('dateDow').textContent=DL[d.getDay()];
  document.getElementById('dateMain').textContent=d.getDate()+' '+MS[d.getMonth()];
  document.getElementById('dateYear').textContent=d.getFullYear();
  document.getElementById('todayBadge').style.display=isToday?'':'none';
}

function renderBoard(){
  updateDate();
  var d=new Date(selDay);var dow=d.getDay();
  var area=document.getElementById('area');

  if(dow===0||dow===6){
    area.innerHTML='<div class="weekend-msg"><div class="wm-txt">'+DL[dow]+'</div></div>';
    return;
  }

  var filter=document.getElementById('sprintSel').value;
  var list=filter==='all'?sw:sw.filter(function(x){return x.sprint===filter});
  var board=document.createElement('div');board.className='board';
  var isMobile=window.innerWidth<=680;

  PHASES.forEach(function(ph,pi){
    var here=list.filter(function(x){return getP(x.title,x.sprint)===ph.key});

    var col=document.createElement('div');col.className='col';col.dataset.phase=ph.key;
    // set colour vars for this phase
    col.style.setProperty('--col-color',ph.color);
    var hex=ph.color;
    col.style.setProperty('--col-tint',hex+'12');
    if(here.length>0)col.classList.add('has-stories');
    col.addEventListener('dragover',function(e){e.preventDefault();col.classList.add('drag-over')});
    col.addEventListener('dragleave',function(){col.classList.remove('drag-over')});
    col.addEventListener('drop',function(e){
      e.preventDefault();col.classList.remove('drag-over');
      if(dragSW){setP(dragSW.title,dragSW.sprint,ph.key);addXP(5);dragSW=null;renderBoard();}
    });

    var head=document.createElement('div');head.className='col-head';
    var iconW=document.createElement('div');iconW.className='col-icon-wrap';iconW.innerHTML=ICONS[ph.key];
    var tDiv=document.createElement('div');tDiv.className='col-title';
    tDiv.textContent=ph.label;

    if(isMobile){
      var hInner=document.createElement('div');hInner.className='col-head-inner';
      hInner.appendChild(tDiv);
      var chev=document.createElement('span');chev.className='col-chev';chev.innerHTML='&#8964;';
      head.appendChild(iconW);head.appendChild(hInner);head.appendChild(chev);
    } else {
      head.appendChild(iconW);head.appendChild(tDiv);
    }
    col.appendChild(head);

    var body=document.createElement('div');body.className='col-body';

    here.forEach(function(story){
      var ci=PHASES.findIndex(function(p){return p.key===ph.key});
      var prev=PHASES[ci-1];var next=PHASES[ci+1];
      var card=document.createElement('div');card.className='story-card card-in';
      // colour bar at top
      var bar=document.createElement('div');bar.className='card-color-bar';
      bar.style.background='linear-gradient(90deg,'+ph.color+','+ph.color+'88)';
      card.appendChild(bar);
      card.draggable=true;
      var spEl=document.createElement('div');spEl.className='sc-sprint';spEl.textContent=story.sprint;
      var ttEl=document.createElement('div');ttEl.className='sc-title';ttEl.textContent=story.title;
      var btns=document.createElement('div');btns.className='sc-btns';
      var bb=document.createElement('button');bb.className='sc-b';bb.innerHTML='&#8592;';if(!prev)bb.disabled=true;
      bb.addEventListener('click',function(e){e.stopPropagation();if(!prev)return;setP(story.title,story.sprint,prev.key);addXP(1);toast(prev.label);renderBoard();});
      var bf=document.createElement('button');
      if(!next){bf.className='sc-b done-btn';bf.textContent='Done';}
      else{
        bf.className='sc-b';bf.innerHTML='&#8594;';
        bf.style.background=ph.color+'18';
        bf.style.color=ph.color;
      }
      bf.addEventListener('click',function(e){
        e.stopPropagation();
        // shimmer the card
        card.classList.add('advancing');
        setTimeout(function(){card.classList.remove('advancing')},450);
        var r=bf.getBoundingClientRect();confetti(r.left+r.width/2,r.top+r.height/2);
        if(next){setP(story.title,story.sprint,next.key);addXP(10);var m=MSGS[next.key];toast(m[Math.floor(Math.random()*m.length)]);if(next.key==='release')setTimeout(function(){showCelebration(story.title,true)},300);}
        else{addXP(20);setTimeout(function(){showCelebration(story.title,false)},300);}
        renderBoard();
      });
      btns.appendChild(bb);btns.appendChild(bf);
      card.appendChild(spEl);card.appendChild(ttEl);card.appendChild(btns);
      card.addEventListener('dragstart',function(){dragSW=story;setTimeout(function(){card.classList.add('dragging')},0)});
      card.addEventListener('dragend',function(){dragSW=null;card.classList.remove('dragging')});
      body.appendChild(card);
    });

    col.appendChild(body);board.appendChild(col);

    if(isMobile){
      if(here.length>0){body.classList.add('open');chev.classList.add('open');}
      head.addEventListener('click',function(){body.classList.toggle('open');if(typeof chev!=='undefined')chev.classList.toggle('open');});
    }
  });

  area.innerHTML='';area.appendChild(board);
}

function processFile(file){
  var r=new FileReader();
  r.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    var sd=wb.Sheets['Sprint Dates']||wb.Sheets['Sprint dates'];
    var us=wb.Sheets['Sprint Stories']||wb.Sheets['Sprint stories'];
    if(!sd||!us){alert('Need Sprint Dates and Sprint Stories sheets');return;}
    sprints=XLSX.utils.sheet_to_json(sd).map(function(r){return{name:String(r['Sprint Number']||r['Sprint']).trim(),s:new Date(r['Start Date']||r['Start']),e:new Date(r['End Date']||r['End'])}});
    stories=XLSX.utils.sheet_to_json(us).map(function(r){return{sprint:String(r['Sprint Number']||r['Sprint']).trim(),title:String(r['User Stories']||r['Story']||r['User Story']).trim()}});
    rebuild();document.getElementById('overlay').classList.add('hidden');
    var btn=document.getElementById('reupBtn');btn.className='up-btn done';btn.childNodes[1].textContent='Loaded';
    initBoard();
  };
  r.readAsArrayBuffer(file);
}

updateGameBar();
})();
